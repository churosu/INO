<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INO — 異能力カードバトル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=13">
</head>
<body>

<!-- 背景の色(盤面色に追従) -->
<div id="bgtint" style="position:fixed;inset:0;z-index:0;pointer-events:none;transition:background .6s ease"></div>

<!-- メニュー -->
<div id="menu" class="screen">
  <div class="card-panel">
    <div class="logo display">INO</div>
    <div class="tagline">異能力カードバトル ／ 最大4人オンライン対戦</div>

    <label class="fld" for="nameInput">プレイヤー名</label>
    <input type="text" id="nameInput" maxlength="10" placeholder="なまえ" autocomplete="off">

    <button class="btn primary" id="soloBtn">1人で遊ぶ（AIと対戦）</button>
    <button class="btn ghost" id="rulesBtn">📖 ルール説明・カード一覧</button>

    <div class="divider">オンラインで対戦</div>

    <button class="btn ghost" id="createBtn">ルームを作る（ホスト）</button>

    <label class="fld" for="codeInput">ルームコードで参加</label>
    <input type="text" id="codeInput" placeholder="ino-xxxxxx" autocomplete="off" autocapitalize="none">
    <button class="btn ghost" id="joinBtn">参加する</button>

    <div class="err" id="menuErr"></div>
    <div class="hint">まずは「1人で遊ぶ」で動作を確認できます。オンラインはルームを作って友だちにコードを共有、または相手のコードで参加します。空席はAIが埋めます。</div>
  </div>
</div>

<!-- ロビー -->
<div id="lobby" class="screen hidden">
  <div class="card-panel">
    <div class="logo display" style="font-size:40px">ロビー</div>
    <label class="fld">ルームコード（共有して参加してもらう）</label>
    <div class="roomcode" id="roomCode">—</div>
    <button class="btn ghost" id="copyBtn" style="margin-top:8px">コードをコピー</button>

    <div class="roster" id="rosterList"></div>

    <button class="btn primary hidden" id="startBtn">ゲーム開始</button>
    <button class="btn ghost" id="leaveBtn">退出</button>
    <div class="hint" id="lobbyHint"></div>
  </div>
</div>

<!-- ゲーム -->
<div id="game">
  <div id="board-root" class="table"></div>
</div>

<!-- カットイン(シグネチャー) -->
<div id="cutin" class="cutin-layer"></div>

<!-- アニメーション用レイヤー(ドロー演出など) -->
<div id="fxlayer" style="position:fixed;inset:0;z-index:45;pointer-events:none;overflow:hidden"></div>

<!-- ルール説明オーバーレイ -->
<div id="rules" class="rules-layer hidden"></div>

<!-- 決定モーダル -->
<div id="modal" class="modal-layer"></div>

<!-- トースト -->
<div id="toast" style="position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:60;
  background:#1b2030;border:1px solid #2b3245;color:#eef1fa;padding:10px 18px;border-radius:999px;
  font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center"></div>

<!-- PeerJS -->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<!-- ゲーム本体 -->
<script src="js/data.js?v=13"></script>
<script src="js/engine.js?v=13"></script>
<script src="js/ai.js?v=13"></script>
<script src="js/net.js?v=13"></script>
<script src="js/ui.js?v=13"></script>
<script src="js/main.js?v=13"></script>

<!-- 読み込み診断 -->
<script>
window.addEventListener('load', function () {
  setTimeout(function () {
    var errEl = document.getElementById('menuErr');
    var coreOK = window.app && window.INOEngine && window.INOUI && window.INONet && window.buildDeck;
    if (!coreOK) {
      errEl.textContent = '読み込みエラー：ゲーム本体を読み込めませんでした。index.html と同じ場所に js/ css/ assets/ の各フォルダがあるか、フォルダ名・ファイル名の大文字小文字が一致しているか確認してください。';
      return;
    }
    if (typeof Peer === 'undefined') {
      errEl.textContent = '注意：オンライン用のPeerJSを読み込めませんでした（オンライン対戦は使えません）。「1人で遊ぶ」はそのまま遊べます。';
    }
  }, 1800);
});
</script>
</body>
</html>
